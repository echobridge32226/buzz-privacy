<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Buzz</title>
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon/apple-touch-icon.png' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon/favicon-32x32.png' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon/favicon-16x16.png' | relative_url }}" />
  <link rel="icon" type="image/x-icon" href="{{ '/assets/favicon/favicon.ico' | relative_url }}" />
  <link rel="manifest" href="{{ '/assets/favicon/site.webmanifest' | relative_url }}" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F8F9FB;
      color: #0F1115;
      line-height: 1.7;
    }

    /* ── Header / Nav ── */
    header {
      background: #fff;
      border-bottom: 1px solid #EBEBED;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-logo {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      object-fit: cover;
    }
    .header-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: #0F1115;
      text-decoration: none;
    }
    nav {
      margin-left: auto;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    nav a {
      color: #6B7280;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
    }
    nav a:hover { background: #F3F4F6; color: #0F1115; }
    nav a.active { background: #EBF2FF; color: #1870FF; font-weight: 600; }

    /* ── Main content ── */
    main {
      max-width: 740px;
      margin: 40px auto;
      padding: 0 24px 72px;
    }

    /* ── Page heading ── */
    h2 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      color: #0F1115;
    }
    .updated {
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 36px;
    }

    /* ── Sections ── */
    section { margin-bottom: 32px; }
    section h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #0F1115;
      letter-spacing: -0.1px;
    }
    section h4 {
      font-size: 13px;
      font-weight: 600;
      margin: 16px 0 6px;
      color: #374151;
    }
    hr { border: none; border-top: 1px solid #EBEBED; margin: 32px 0; }

    /* ── Text ── */
    p, li { font-size: 15px; color: #374151; }
    p + p { margin-top: 10px; }
    ul { padding-left: 20px; }
    li { margin-bottom: 5px; }
    strong { color: #0F1115; }
    a { color: #1870FF; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 8px; }
    th {
      text-align: left;
      padding: 9px 12px;
      background: #F3F4F6;
      font-weight: 600;
      font-size: 13px;
      border: 1px solid #E5E7EB;
      color: #374151;
    }
    td {
      padding: 9px 12px;
      border: 1px solid #E5E7EB;
      color: #374151;
      vertical-align: top;
    }
    td.native { color: #6B7280; }

    /* ── Numbered steps list ── */
    .steps { counter-reset: step; list-style: none; padding: 0; }
    .steps li {
      counter-increment: step;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 14px;
      font-size: 15px;
      color: #374151;
    }
    .steps li::before {
      content: counter(step);
      min-width: 28px;
      height: 28px;
      background: #1870FF;
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Card blocks ── */
    .option-block, .cta-box {
      background: #fff;
      border: 1px solid #E5E7EB;
      border-radius: 16px;
      padding: 24px;
      margin-top: 12px;
    }
    .option-block h4 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #0F1115;
    }
    .cta-box p { margin-bottom: 14px; }

    /* ── CTA email button ── */
    .email-link {
      display: inline-block;
      background: #1870FF;
      color: #fff !important;
      padding: 12px 22px;
      border-radius: 12px;
      text-decoration: none !important;
      font-weight: 600;
      font-size: 15px;
      margin-top: 14px;
      transition: background 0.15s;
    }
    .email-link:hover { background: #1460E0; }

    /* ── Status tags ── */
    .tag-del { color: #DC2626; font-weight: 600; }
    .tag-keep { color: #16A34A; font-weight: 600; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.2px;
    }
    /* inline status badges (instant / email) */
    .badge-instant { background: #DCFCE7; color: #166534; }
    .badge-email   { background: #EDE9FE; color: #4C1D95; }
    /* provider badges */
    .badge-deepgram { background: #DBEAFE; color: #1D4ED8; }
    .badge-gladia   { background: #D1FAE5; color: #065F46; }
    .badge-sarvam   { background: #FEF3C7; color: #92400E; }
    .badge-deepl    { background: #FFF7ED; color: #C2410C; }
    .badge-google   { background: #F0FDF4; color: #15803D; }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 13px;
      color: #9CA3AF;
      padding: 28px 24px;
      border-top: 1px solid #EBEBED;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      nav { gap: 2px; }
      nav a { font-size: 12px; padding: 4px 8px; }
      .header-title { font-size: 16px; }
      h2 { font-size: 22px; }
      main { margin-top: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/index.html' | relative_url }}">
      <img src="{{ '/assets/images/app_icon.png' | relative_url }}" alt="Buzz" class="header-logo" />
    </a>
    <a href="{{ '/index.html' | relative_url }}" class="header-title">Buzz</a>
    <nav>
      <a href="{{ '/index.html' | relative_url }}" {% if page.url == '/index.html' or page.url == '/' %}class="active"{% endif %}>Privacy Policy</a>
      <a href="{{ '/delete-data.html' | relative_url }}" {% if page.url == '/delete-data.html' %}class="active"{% endif %}>Delete Data</a>
      <a href="{{ '/delete-account.html' | relative_url }}" {% if page.url == '/delete-account.html' %}class="active"{% endif %}>Delete Account</a>
      <a href="{{ '/languages.html' | relative_url }}" {% if page.url == '/languages.html' %}class="active"{% endif %}>Languages</a>
      <a href="{{ '/terms.html' | relative_url }}" {% if page.url == '/terms.html' %}class="active"{% endif %}>Terms</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>© 2026 Buzz. All rights reserved.</footer>
</body>
</html>
